<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稷韧云图 · 作战室</title>
<style>
/* ── Design tokens ── */
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #1c2330;
  --surface-3: #242c3a;
  --border: #2a3444;
  --border-subtle: #1e2836;

  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #565f6d;

  --green: #3fb950;
  --green-dim: #1a3a22;
  --green-text: #7ee787;

  --amber: #d29922;
  --amber-dim: #3a2a0a;
  --amber-text: #e3b341;

  --red: #f85149;
  --red-dim: #3a0d0b;
  --red-text: #ff7b72;

  --blue: #58a6ff;
  --blue-dim: #0d2340;

  --gray-dim: #1c2330;
  --gray-text: #8b949e;

  --radius: 8px;
  --radius-lg: 12px;

  font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { min-height: 100vh; }

a { color: var(--blue); text-decoration: none; }

/* ── Layout ── */
.shell {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* Sticky header */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.site-header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.header-brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.header-brand span { color: var(--amber-text); }
.header-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text-dim);
  flex: 1;
}
.header-meta .chip {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  white-space: nowrap;
}
.updated-chip {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 11px;
  white-space: nowrap;
}

/* ── Section scaffold ── */
.section {
  margin-top: 40px;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-subtle);
}

/* ── Hero meta block ── */
.hero {
  margin-top: 32px;
  padding: 28px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(93,163,255,0.04) 0%, transparent 60%);
  pointer-events: none;
}
.hero-one-liner {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 20px;
  max-width: 900px;
}
.hero-one-liner .hl { color: var(--amber-text); }
.meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.meta-label {
  font-size: 10px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.meta-value {
  font-size: 13px;
  color: var(--text-dim);
}

/* ── Completion routes (hero section) ── */
.routes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) {
  .routes-grid { grid-template-columns: 1fr; }
}
.route-card {
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  border: 1px solid;
  position: relative;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.route-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.route-card.in_progress {
  background: linear-gradient(145deg, var(--amber-dim), var(--surface));
  border-color: var(--amber);
}
.route-card.insufficient {
  background: var(--gray-dim);
  border-color: var(--border);
  opacity: 0.75;
}
.route-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}
.route-name {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.route-role-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.in_progress .route-role-badge { background: var(--amber-dim); color: var(--amber-text); border: 1px solid var(--amber); }
.insufficient .route-role-badge { background: var(--surface-3); color: var(--gray-text); border: 1px solid var(--border); }

.route-verdict {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text-dim);
}
.in_progress .route-verdict { color: var(--amber-text); }

.route-pct-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.route-bar-track {
  height: 6px;
  background: var(--surface-3);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 14px;
}
.route-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.in_progress .route-bar-fill { background: var(--amber); }
.insufficient .route-bar-fill { background: var(--gray-text); }

.route-detail {
  font-size: 12.5px;
  color: var(--text-dim);
  margin-bottom: 10px;
  line-height: 1.5;
}
.route-blocker {
  font-size: 11.5px;
  color: var(--text-muted);
  background: rgba(0,0,0,0.2);
  border-left: 2px solid var(--border);
  padding: 6px 10px;
  border-radius: 0 4px 4px 0;
}
.route-blocker strong { color: var(--text-dim); }
.routes-note {
  margin-top: 14px;
  font-size: 12px;
  color: var(--text-muted);
  background: var(--surface-2);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 10px 14px;
}

/* ── Tracks ── */
.tracks-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.track-row {
  display: grid;
  grid-template-columns: 120px 60px 1fr 320px;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: background 0.12s;
}
.track-row:hover { background: var(--surface-2); }
@media (max-width: 800px) {
  .track-row { grid-template-columns: 1fr 48px; }
  .track-bar-wrap, .track-note { grid-column: 1 / -1; }
}
.track-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.track-pct {
  font-size: 18px;
  font-weight: 700;
  text-align: right;
}
.track-pct.green { color: var(--green-text); }
.track-pct.amber { color: var(--amber-text); }
.track-pct.red   { color: var(--red-text); }

.track-bar-wrap {
  height: 8px;
  background: var(--surface-3);
  border-radius: 4px;
  overflow: hidden;
}
.track-bar-fill {
  height: 100%;
  border-radius: 4px;
}
.fill-green { background: var(--green); }
.fill-amber { background: var(--amber); }
.fill-red   { background: var(--red); }

.track-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ── People ── */
.people-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.person-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: border-color 0.15s, transform 0.15s;
}
.person-card:hover {
  border-color: var(--blue);
  transform: translateY(-1px);
}
.person-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 12px;
}
.person-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}
.person-role {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.person-issue {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid rgba(88,166,255,0.2);
  white-space: nowrap;
}
.person-issue.none { background: var(--surface-3); color: var(--text-muted); border-color: var(--border); }

.person-current {
  font-size: 12.5px;
  color: var(--amber-text);
  background: var(--amber-dim);
  border: 1px solid rgba(210,153,34,0.2);
  border-radius: var(--radius);
  padding: 8px 12px;
  margin-bottom: 12px;
  line-height: 1.4;
}
.person-section-label {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
  margin-top: 10px;
}
.person-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.person-list li {
  font-size: 12px;
  color: var(--text-dim);
  padding-left: 14px;
  position: relative;
  line-height: 1.4;
}
.person-list li::before {
  content: '·';
  position: absolute;
  left: 4px;
  color: var(--text-muted);
}
.person-list li.star-item {
  color: var(--amber-text);
  font-weight: 600;
}
.person-list li.star-item::before { content: '★'; color: var(--amber); font-size: 9px; top: 1px; }

/* ── V5 Reality ── */
.v5-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
@media (max-width: 768px) { .v5-layout { grid-template-columns: 1fr; } }

.v5-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}
.v5-card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.v5-stat {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 8px;
}
.v5-stat-number {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
}
.v5-stat-unit { font-size: 13px; color: var(--text-dim); }
.v5-list-row {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.v5-list-row strong { color: var(--text); }

.province-bar-list {
  margin-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.province-bar-row {
  display: grid;
  grid-template-columns: 80px 28px 1fr;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-dim);
}
.province-bar-mini {
  height: 6px;
  background: var(--surface-3);
  border-radius: 3px;
  overflow: hidden;
}
.province-bar-mini-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
}

.v5-headline {
  font-size: 17px;
  font-weight: 700;
  color: var(--amber-text);
  padding: 16px 20px;
  background: var(--amber-dim);
  border: 1px solid var(--amber);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
  line-height: 1.5;
}
.v5-intersection {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.v5-intersection-title {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.v5-intersection-stats {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.v5-int-item { display: flex; flex-direction: column; }
.v5-int-num {
  font-size: 28px;
  font-weight: 700;
  color: var(--green-text);
}
.v5-int-label { font-size: 11px; color: var(--text-muted); }

.v5-gaps {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}
.v5-gaps-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.gap-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.4;
}
.gap-item:last-child { border-bottom: none; }
.gap-check { color: var(--amber-text); font-size: 13px; flex-shrink: 0; margin-top: 1px; }

.doc-error-banner {
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-size: 13px;
  color: var(--red-text);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.5;
}
.doc-error-icon { font-size: 18px; flex-shrink: 0; }

/* ── Models table ── */
.models-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}
.models-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.models-table th {
  background: var(--surface-3);
  color: var(--text-muted);
  font-size: 11px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 12px 16px;
  text-align: left;
  font-weight: 600;
  white-space: nowrap;
}
.models-table td {
  padding: 12px 16px;
  border-top: 1px solid var(--border-subtle);
  color: var(--text-dim);
  vertical-align: top;
}
.models-table tr:hover td { background: var(--surface-2); }
.models-table tr.warn-row td {
  background: var(--red-dim);
  color: var(--red-text);
}
.models-table tr.warn-row:hover td { background: rgba(58,13,11,0.8); }
.model-name { font-weight: 600; color: var(--text); }
.warn-row .model-name { color: var(--red-text); }
.r2-value { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.status-done { background: var(--green-dim); color: var(--green-text); }
.status-disclosed { background: var(--red-dim); color: var(--red-text); }

/* ── Data sufficiency ── */
.sufficiency-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 800px) { .sufficiency-grid { grid-template-columns: 1fr; } }

.suf-card {
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid;
}
.suf-card.green { background: var(--green-dim); border-color: var(--green); }
.suf-card.amber { background: var(--amber-dim); border-color: var(--amber); }
.suf-card.blue  { background: var(--blue-dim);  border-color: var(--blue); }

.suf-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.green .suf-label { color: var(--green-text); }
.amber .suf-label { color: var(--amber-text); }
.blue  .suf-label { color: var(--blue); }

.suf-text {
  font-size: 13px;
  line-height: 1.6;
}
.green .suf-text { color: var(--green-text); }
.amber .suf-text { color: var(--amber-text); }
.blue  .suf-text { color: var(--text-dim); }

/* ── Milestones timeline ── */
.timeline {
  position: relative;
  padding-left: 28px;
}
.timeline::before {
  content: '';
  position: absolute;
  left: 9px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--border);
  border-radius: 1px;
}
.timeline-item {
  position: relative;
  margin-bottom: 20px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color 0.15s;
}
.timeline-item:last-child { margin-bottom: 0; }
.timeline-item:hover { border-color: var(--border); }

.timeline-dot {
  position: absolute;
  left: -23px;
  top: 18px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  z-index: 1;
}
.dot-done    { background: var(--green); }
.dot-at_risk { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.dot-pending { background: var(--surface-3); border-color: var(--border); }

.timeline-item.at_risk {
  border-color: var(--amber);
  background: linear-gradient(135deg, var(--amber-dim), var(--surface));
}
.timeline-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.timeline-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: "SF Mono", monospace;
  white-space: nowrap;
}
.timeline-title {
  font-size: 13.5px;
  font-weight: 600;
  flex: 1;
}
.done .timeline-title    { color: var(--green-text); }
.at_risk .timeline-title { color: var(--amber-text); }
.pending .timeline-title { color: var(--text-dim); }
.at-risk-badge {
  font-size: 10px;
  padding: 2px 8px;
  background: var(--amber-dim);
  color: var(--amber-text);
  border: 1px solid var(--amber);
  border-radius: 10px;
  font-weight: 700;
  white-space: nowrap;
}

/* ── Risks ── */
.risks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.risk-card {
  border-radius: var(--radius-lg);
  padding: 20px;
  border: 1px solid;
  transition: transform 0.15s;
}
.risk-card:hover { transform: translateY(-2px); }
.risk-card.high   { background: var(--red-dim);   border-color: var(--red); }
.risk-card.medium { background: var(--amber-dim); border-color: var(--amber); }

.risk-level-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.high .risk-level-badge   { background: rgba(248,81,73,0.2); color: var(--red-text); }
.medium .risk-level-badge { background: rgba(210,153,34,0.2); color: var(--amber-text); }

.risk-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 8px;
}
.high .risk-title   { color: var(--red-text); }
.medium .risk-title { color: var(--amber-text); }

.risk-detail {
  font-size: 12.5px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Next 30 days ── */
.next-table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.next-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  align-items: start;
  gap: 0;
  border-bottom: 1px solid var(--border-subtle);
  transition: background 0.12s;
}
.next-row:last-child { border-bottom: none; }
.next-row:hover { background: var(--surface-2); }
.next-row.star { background: linear-gradient(90deg, var(--amber-dim), var(--surface)); border-color: rgba(210,153,34,0.15); }
.next-row.star:hover { background: linear-gradient(90deg, var(--amber-dim), var(--surface-2)); }

.next-owner {
  padding: 14px 16px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--text-dim);
  border-right: 1px solid var(--border-subtle);
  background: var(--surface);
  position: relative;
}
.next-row.star .next-owner { color: var(--amber-text); background: var(--amber-dim); }

.next-task {
  padding: 14px 16px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}
.next-row.star .next-task {
  color: var(--amber-text);
  font-weight: 600;

// ── Render helpers ──────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function pctColor(pct) {
  if (pct >= 80) return 'green';
  if (pct >= 50) return 'amber';
  return 'red';
}

function pctFillClass(pct) {
  if (pct >= 80) return 'fill-green';
  if (pct >= 50) return 'fill-amber';
  return 'fill-red';
}

function bar(pct, cls) {
  return `<div class="track-bar-wrap"><div class="track-bar-fill ${esc(cls)}" style="width:${Math.min(pct,100)}%"></div></div>`;
}

// ── 1. Header ──────────────────────────────────────────────────
(function renderHeader() {
  const m = STATE.meta;
  document.getElementById('hdr-level').textContent = m.level;
  document.getElementById('hdr-cycle').textContent = m.cycle;
  document.getElementById('hdr-funding').textContent = m.funding;
  document.getElementById('hdr-inst').textContent = m.institution;
  document.getElementById('hdr-updated').textContent = '更新：' + m.updated;

  document.getElementById('hero-one-liner').innerHTML = esc(m.one_liner)
    .replace('软著随时保底', '<span class="hl">软著随时保底</span>')
    .replace('论文是主推', '<span class="hl">论文是主推</span>');

  const fields = [
    ['项目全称', m.full_name],
    ['项目级别', m.level],
    ['周期', m.cycle],
    ['经费', m.funding],
    ['单位', m.institution],
    ['维护', m.maintained_by]
  ];
  document.getElementById('hero-meta-grid').innerHTML = fields.map(([label, val]) => `
    <div class="meta-item">
      <span class="meta-label">${esc(label)}</span>
      <span class="meta-value">${esc(val)}</span>
    </div>
  `).join('');

  document.getElementById('footer-maintained').textContent = m.maintained_by;
})();

      <span class="v5-stat-number" style="color:var(--amber-text)">${ys.provinces}</span>

    <span class="doc-error-icon">🚨</span>

    <div class="timeline-item ${cardCls}">

        <span class="timeline-date">${esc(m.date)}</span>
