# /etc/nginx/sites-available/grainrisk.app
# 粮食风险预测系统 v0.1 · Phase 5 GCP 部署 (6/16-25)
#
# Architecture
# ============
#       Internet                                                     GCP e2-medium
#  https://grainrisk.app
#  https://www.grainrisk.app
#         │
#         │ TCP 443 (TLS terminate here via Let's Encrypt)
#         ▼
#    ┌─────────────────────────────────────────────────────────────────────┐
#    │  nginx (this config)                                                │
#    │    /            ─►  Vue build at /var/www/grainrisk/dist/           │
#    │    /api/*       ─►  proxy http://127.0.0.1:5000 (gunicorn + Flask)  │
#    │    /.well-known ─►  /var/www/certbot/   (Let's Encrypt 续签用)      │
#    │    + 4 HTTP 安全头 (always)                                          │
#    └─────────────────────────────────────────────────────────────────────┘
#
# 安装位置
# ========
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/grainrisk.app
#   sudo ln -s /etc/nginx/sites-available/grainrisk.app /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# 安全头
# ======
# Issue #26 HIGH#4 — Strict-Transport-Security / X-Content-Type-Options / X-Frame-Options /
#                    Referrer-Policy 全部 `always` 保证 4xx/5xx 响应也带头。
#                    Content-Security-Policy 暂不开,理由见下方块注释。
#
# 参考: ~/.claude/rules/ecc/web/security.md

# ──────────────────────────────────────────────────────────────────────────
# upstream: gunicorn 监听 127.0.0.1:5000 (PR #32 docstring 已说明)
# ──────────────────────────────────────────────────────────────────────────
upstream grainrisk_backend {
    server 127.0.0.1:5000 fail_timeout=0;
    # 多 worker (gunicorn -w 4) 时不需要在 nginx 这边做负载均衡, gunicorn 自带 worker pool
    keepalive 16;
}

# ──────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS redirect + Let's Encrypt webroot challenge
# ──────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name grainrisk.app www.grainrisk.app;

    # Let's Encrypt http-01 challenge 路径 (certbot --webroot 模式用)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部 301 跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────────────────────
# HTTPS 主入口
# ──────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grainrisk.app www.grainrisk.app;

    # === Let's Encrypt 证书 (setup_letsencrypt.sh 跑过后生效) ===
    ssl_certificate     /etc/letsencrypt/live/grainrisk.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grainrisk.app/privkey.pem;

    # 推荐 TLS 设置 (Mozilla intermediate, 2026)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # === 4 HTTP 安全头 (Issue #26 HIGH#4) ===
    # always 保证 4xx/5xx 也带头,防 nginx 默认配置遗漏
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # === Content-Security-Policy ===
    # 暂不启用,理由:
    #   1. ECharts 内联 SVG / canvas tooltip 用 inline style, 需要 style-src 'unsafe-inline'
    #      或重构 ECharts extraCssText 用法 (工作量大)
    #   2. Vue 3 prod build 默认无 inline script, 但 hydration boundary 可能例外
    #   3. 渐进开启策略: 先用 Content-Security-Policy-Report-Only 收集违规 1 周, 再切硬模式
    # 建议 6/25 上线后第 2 周渐进开启,参考 ~/.claude/rules/ecc/web/security.md
    #
    # 启用时取消下面注释 (注意 {RANDOM} nonce 需要 nginx-module-perl 或 ssi 配合,
    # 静态 Vue build 用法是直接生成 build-time nonce 或干脆移到 Report-Only):
    #
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

    # === Permissions-Policy (限制浏览器特性) ===
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # === gzip ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # === access / error log ===
    access_log /var/log/nginx/grainrisk.access.log;
    error_log  /var/log/nginx/grainrisk.error.log warn;

    # === client body (uploads 暂时只 /api/predict POST JSON, 8K 够用) ===
    client_max_body_size 64K;

    # ============== Routes ==============

    # Vue 静态资源 (build 产物)
    root /var/www/grainrisk/dist;
    index index.html;

    # 静态资源带长缓存
    location ~* \.(?:css|js|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # /api/* 反代 gunicorn
    location /api/ {
        proxy_pass http://grainrisk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # 模型推理超时: XGB ~20ms / LSTM ~150ms / Att-LSTM ~200ms,
        # 30s 留足首次 LSTM cold start (TF lazy graph compile)
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # rate limit 由 flask-limiter 在 app 层做 (PR #32),nginx 不重复
    }

    # Vue SPA history 路由兜底 — 所有未匹配静态资源的请求返 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 拒绝隐藏文件
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
